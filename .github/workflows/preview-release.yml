---
name: Preview Release

on:
  # zizmor: ignore[dangerous-triggers] This workflow intentionally runs after CI
  # succeeds on master, checks out the exact tested commit, and creates only a
  # prerelease using repository-scoped contents permissions.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

concurrency:
  group: preview-release-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  preview-release:
    name: Preview Release
    runs-on: macos-latest
    environment: preview-release
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'master'
      }}
    steps:
      - if: ${{ !env.ACT }}
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false
      - name: Install tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: false
          cache_save: false
      - name: Compute preview metadata
        id: metadata
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          label="$(mise exec -- uv run python -m scripts.tooling.versioning preview-label --sha "$HEAD_SHA")"
          {
            printf 'version=%s\n' "$version"
            printf 'label=%s\n' "$label"
            printf 'short_sha=%s\n' "${HEAD_SHA:0:12}"
          } >>"$GITHUB_OUTPUT"
      - name: Import CI release secrets
        env:
          SHORTY_APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.SHORTY_APP_STORE_CONNECT_API_KEY_P8 }}
          SHORTY_APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.SHORTY_APP_STORE_CONNECT_ISSUER_ID }}
          SHORTY_APP_STORE_CONNECT_KEY_ID: ${{ secrets.SHORTY_APP_STORE_CONNECT_KEY_ID }}
          SHORTY_APP_STORE_APP_PROFILE: ${{ secrets.SHORTY_APP_STORE_APP_PROFILE }}
          SHORTY_APP_STORE_EXTENSION_PROFILE: ${{ secrets.SHORTY_APP_STORE_EXTENSION_PROFILE }}
          SHORTY_CI_KEYCHAIN_PASSWORD: ${{ secrets.SHORTY_CI_KEYCHAIN_PASSWORD }}
          SHORTY_CODESIGN_IDENTITY: ${{ secrets.SHORTY_CODESIGN_IDENTITY }}
          SHORTY_DEVELOPER_ID_APP_PROFILE: ${{ secrets.SHORTY_DEVELOPER_ID_APP_PROFILE }}
          SHORTY_DEVELOPER_ID_CERTIFICATE_PEM: ${{ secrets.SHORTY_DEVELOPER_ID_CERTIFICATE_PEM }}
          SHORTY_DEVELOPER_ID_EXTENSION_PROFILE: ${{ secrets.SHORTY_DEVELOPER_ID_EXTENSION_PROFILE }}
          SHORTY_DEVELOPER_ID_PRIVATE_KEY_PASSWORD: ${{ secrets.SHORTY_DEVELOPER_ID_PRIVATE_KEY_PASSWORD }}
          SHORTY_DEVELOPER_ID_PRIVATE_KEY_PEM: ${{ secrets.SHORTY_DEVELOPER_ID_PRIVATE_KEY_PEM }}
        run: bash scripts/tooling/import_ci_release_secrets.sh
      - name: Package preview artifact
        env:
          ARTIFACT_LABEL: ${{ steps.metadata.outputs.label }}
          SHORTY_BUILD_NUMBER: ${{ github.run_number }}
          SHORTY_MARKETING_VERSION: ${{ steps.metadata.outputs.version }}
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          : "${SHORTY_CODESIGN_IDENTITY:?Set SHORTY_CODESIGN_IDENTITY to a Developer ID Application identity.}"
          mise exec -- just app-package \
            VERSION="$VERSION" \
            ARTIFACT_LABEL="$ARTIFACT_LABEL"
      - name: Notarize preview artifact
        env:
          ARTIFACT_LABEL: ${{ steps.metadata.outputs.label }}
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          mise exec -- just app-notarize \
            VERSION="$VERSION" \
            ARTIFACT_LABEL="$ARTIFACT_LABEL"
      - name: Package matching source archive
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          mise exec -- just source-package VERSION="$VERSION"
      - name: Verify preview artifact
        env:
          ARTIFACT_LABEL: ${{ steps.metadata.outputs.label }}
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          bash scripts/tooling/release_verify.sh \
            --version "$VERSION" \
            --artifact-label "$ARTIFACT_LABEL" \
            --require-codesign \
            --require-gatekeeper \
            --require-staple
      - name: Upload App Store candidate to TestFlight
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          mise exec -- just app-store-export-testflight \
            VERSION="$VERSION" \
            BUILD_NUMBER="$BUILD_NUMBER"
      - name: Publish preview release
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.metadata.outputs.version }}
          LABEL: ${{ steps.metadata.outputs.label }}
          SHORT_SHA: ${{ steps.metadata.outputs.short_sha }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          archive=".build/releases/shorty-$LABEL-macos.zip"
          checksum="$archive.sha256"
          source_archive=".build/releases/shorty-$VERSION-source.tar.gz"
          source_checksum="$source_archive.sha256"
          notes="$RUNNER_TEMP/preview-release-notes.md"

          cat >"$notes" <<EOF
          Preview build for commit $HEAD_SHA.

          Bundle version: $VERSION
          Build number: $BUILD_NUMBER
          Artifact label: $LABEL

          This preview is Developer ID signed, notarized, stapled, and verified before upload.
          A matching sandboxed App Store archive has been uploaded to TestFlight for internal testing.
          This is a prerelease preview artifact. Public releases use SemVer tags like v$VERSION.
          EOF

          gh release delete "$LABEL" --repo "$REPO" --cleanup-tag --yes || true
          gh release create "$LABEL" \
            "$archive" \
            "$checksum" \
            "$source_archive" \
            "$source_checksum" \
            --repo "$REPO" \
            --target "$HEAD_SHA" \
            --title "Preview $SHORT_SHA" \
            --notes-file "$notes" \
            --prerelease \
            --latest=false
