<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720" role="img" aria-labelledby="title desc">
  <title id="title">Command map shortcut routing</title>
  <desc id="desc">Shortcut keys route from a canonical command row to native macOS apps and supported web apps.</desc>
  <defs>
    <linearGradient id="backdrop" x1="132" x2="860" y1="40" y2="674" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f9fbf9" />
      <stop offset="1" stop-color="#e8f0ec" />
    </linearGradient>
    <linearGradient id="graphite" x1="202" x2="778" y1="126" y2="604" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#26312d" />
      <stop offset="1" stop-color="#111716" />
    </linearGradient>
    <filter id="soft-shadow" x="120" y="68" width="740" height="600" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="22" flood-color="#17211e" flood-opacity=".14" stdDeviation="24" />
    </filter>
  </defs>
  <rect width="980" height="720" rx="52" fill="url(#backdrop)" />
  <path d="M58 600c110-44 173-79 274-76 121 4 169 63 294 48 102-12 178-65 302-42" fill="none" stroke="#d0ddd6" stroke-linecap="round" stroke-width="2" />
