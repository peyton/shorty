      <rect x="688" y="124" width="28" height="22" rx="6" />
      <rect x="724" y="124" width="48" height="22" rx="6" />
    </g>
    <g font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">
      <text x="214" y="222" fill="#5c6862" font-size="15" font-weight="700">CANONICAL SHORTCUT</text>
      <text x="214" y="254" fill="#111716" font-size="34" font-weight="800">Command K</text>
      <text x="214" y="284" fill="#5c6862" font-size="18">Search everywhere</text>
      <rect x="214" y="322" width="96" height="46" rx="10" fill="#111716" />
      <rect x="322" y="322" width="96" height="46" rx="10" fill="#111716" />
