  <path d="M112 246h756" fill="none" stroke="#d0ddd6" stroke-linecap="round" stroke-width="2" />
  <path d="M112 346h756" fill="none" stroke="#d0ddd6" stroke-linecap="round" stroke-width="2" />
  <path d="M112 446h756" fill="none" stroke="#d0ddd6" stroke-linecap="round" stroke-width="2" />
  <g filter="url(#soft-shadow)">
    <rect x="168" y="96" width="644" height="492" rx="34" fill="#ffffff" />
    <rect x="168" y="96" width="644" height="78" rx="34" fill="url(#graphite)" />
    <path d="M168 145h644" stroke="#111716" stroke-opacity=".4" />
    <circle cx="213" cy="135" r="9" fill="#c18427" />
    <circle cx="241" cy="135" r="9" fill="#d4ded8" />
    <circle cx="269" cy="135" r="9" fill="#0f766e" />
    <text x="310" y="142" fill="#f8fbf8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700">Shorty command map</text>
    <g fill="#f8fbf8" opacity=".78">
