<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shorty Page Not Found</title>
    <meta
      name="description"
      content="The requested Shorty page was not found. Return home or contact support."
    />
    <link rel="stylesheet" href="/assets/site.css" />
    <link rel="icon" href="/assets/app-icon.svg" type="image/svg+xml" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/" aria-label="Shorty home">
        <img src="/assets/app-icon.svg" alt="" width="32" height="32" />
        <span>Shorty</span>
      </a>
      <nav class="nav" aria-label="Main navigation">
        <a href="/">Home</a>
        <a href="/support/">Support</a>
        <a href="/privacy/">Privacy</a>
      </nav>
    </header>

    <main class="body-page">
      <div class="page-intro">
        <p class="eyebrow">404</p>
        <h1>Page not found</h1>
        <p class="lede">
          Return to the <a href="/">Shorty home page</a> or email
          <a href="mailto:shorty@peyton.app">shorty@peyton.app</a>.
        </p>
      </div>
      <article class="support-item">
        <img
          class="glyph"
          src="/assets/glyph-support.svg"
          alt=""
          width="48"
          height="48"
        />
        <div>
          <strong>Need a working path?</strong>
          <p>
            The support page has release checks, Accessibility setup, and
            browser bridge commands.
          </p>
        </div>
      </article>
    </main>

    <footer class="footer">
      <p>Contact <a href="mailto:shorty@peyton.app">shorty@peyton.app</a>.</p>
    </footer>
  </body>
</html>
